version: '3.8'

services:
  db-immo:
    image: postgres:15-alpine
    container_name: azur_db
    environment:
      POSTGRES_USER: co_lelong
      POSTGRES_PASSWORD: Clelong@Post.2026
      POSTGRES_DB: azurimmo
    volumes:
      - azur_data:/var/lib/postgresql/data
    networks:
      - immo_network

  back-immo:
    build: .
    image: clelong/azur-back:1.0
    container_name: azur_back
    ports:
      - "8081:8080"
    depends_on:
      - db-immo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-immo:5432/azurimmo
      SPRING_DATASOURCE_USERNAME: co_lelong
      SPRING_DATASOURCE_PASSWORD: Clelong@Post.2026
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - immo_network

networks:
  immo_network:
    driver: bridge

volumes:
  azur_data:
